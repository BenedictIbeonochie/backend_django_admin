{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accept Invite · {{ APP_NAME }}</title>
  <link rel="stylesheet" href="{% static 'admin_portal/styles.css' %}">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="brand-logo" style="margin-bottom:16px;">
        <div class="brand-icon">A</div>
        <div class="brand-name">{{ APP_NAME }}</div>
      </div>
      <h2>Accept Invite</h2>
      <p class="login-sub">Set up your account for <strong>{{ invite.email }}</strong></p>
      {% if messages %}
        {% for message in messages %}
          <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <input type="text" name="full_name" placeholder="Full name (optional)" value="{{ invite.full_name }}">
        <input type="password" name="password1" placeholder="Password (min 10 chars)" required minlength="10">
        <input type="password" name="password2" placeholder="Confirm password" required minlength="10">
        <button class="btn-primary" type="submit">Activate Account</button>
      </form>
    </div>
  </div>
</body>
</html>
