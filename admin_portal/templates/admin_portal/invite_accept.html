{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accept Invite · {{ APP_NAME }}</title>
  <link rel="stylesheet" href="{% static 'admin_portal/styles.css' %}">
</head>
<body>
  <div class="login-wrap card">
    <h2>Accept Admin Invite</h2>
    <p>Invite for <strong>{{ invite.email }}</strong></p>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="primary" type="submit">Activate Account</button>
    </form>
  </div>
</body>
</html>
